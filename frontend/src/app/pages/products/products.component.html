<div class="products-container">
  <h1>Our Products</h1>
  <div class="grid">
    <div *ngFor="let product of products" class="product-card" [routerLink]="['/products', product.id]">
      <div class="product-image-container">
        <img 
          *ngIf="product.imageUrls && product.imageUrls.length > 0" 
          [src]="product.imageUrls[0]" 
          alt="{{ product.name }}" 
          class="product-image">
        <div *ngIf="!product.imageUrls || product.imageUrls.length === 0" class="product-image-placeholder">
          <span>No Image</span>
        </div>
      </div>
      <div class="product-info">
        <h3 class="product-name">{{ product.name }}</h3>
        <p class="product-description">{{ product.description | slice:0:80 }}...</p>
        <div class="product-footer">
          <div class="product-price">{{ product.price | kshCurrency }}</div>
          <div class="product-stock" [class.low-stock]="product.stock < 5">
            {{ product.stock > 0 ? 'In Stock' : 'Out of Stock' }}
          </div>
        </div>
      </div>
    </div>
    <div *ngIf="products.length === 0" class="no-products">
      No products available.
    </div>
  </div>
</div>
